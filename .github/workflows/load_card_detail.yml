name: Load Pokemon Card Detail to BigQuery

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC on the 1st of each month

jobs:
  load-card-detail:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests google-cloud-bigquery pyarrow db-dtypes

      - name: Run loader
        run: python scripts/load_card_detail_to_bq.py
